<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Logo Search Skill Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "SF Pro Display", "Inter", system-ui, sans-serif;
        background: #f5f4ef;
        color: #111111;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(0, 0, 0, 0.05), transparent 28rem),
          linear-gradient(180deg, #faf9f5 0%, #f1eee5 100%);
      }

      main {
        width: min(960px, calc(100vw - 3rem));
        margin: 0 auto;
        padding: 4rem 0 5rem;
      }

      .eyebrow {
        margin: 0 0 1rem;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 12ch;
        font-size: clamp(3rem, 8vw, 5.8rem);
        line-height: 0.95;
        letter-spacing: -0.06em;
      }

      p {
        max-width: 46rem;
        margin: 1.25rem 0 0;
        font-size: 1.1rem;
        line-height: 1.6;
        color: rgba(17, 17, 17, 0.7);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 1rem;
        margin-top: 3rem;
      }

      .tile {
        min-height: 108px;
        padding: 1.25rem;
        border: 1px solid rgba(17, 17, 17, 0.1);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.86);
        backdrop-filter: blur(16px);
        box-shadow: 0 18px 40px rgba(17, 17, 17, 0.07);
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .brand-name {
        font-size: 1.35rem;
        font-weight: 600;
        letter-spacing: -0.03em;
      }

      .brand-logo {
        display: block;
        width: auto;
        max-width: 100%;
        height: 40px;
        object-fit: contain;
      }

      @media (max-width: 640px) {
        main {
          padding-top: 2.5rem;
        }

        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .tile {
          min-height: 92px;
          border-radius: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow" data-logo-demo-state="before">Before</p>
      <h1>Names ready to turn into logos</h1>
      <p>
        This page is intentionally plain. Run the demo transform and every name below becomes a downloaded logo
        asset with stable sizing for a publishable static page.
      </p>
      <section class="grid" aria-label="Brand names">
        <div class="tile"><span class="brand-name" data-logo-brand="OpenAI">OpenAI</span></div>
        <div class="tile"><span class="brand-name" data-logo-brand="Anthropic">Anthropic</span></div>
        <div class="tile"><span class="brand-name" data-logo-brand="OpenClaw">OpenClaw</span></div>
        <div class="tile"><span class="brand-name" data-logo-brand="Cursor">Cursor</span></div>
        <div class="tile"><span class="brand-name" data-logo-brand="OpenCode">OpenCode</span></div>
        <div class="tile"><span class="brand-name" data-logo-brand="Vercel">Vercel</span></div>
        <div class="tile"><span class="brand-name" data-logo-brand="GitHub">GitHub</span></div>
        <div class="tile"><span class="brand-name" data-logo-brand="Supabase">Supabase</span></div>
      </section>
    </main>
  </body>
</html>
